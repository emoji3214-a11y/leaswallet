name: Build Plugin

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu indir
        uses: actions/checkout@v4

      - name: Java 21 kur
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Maven ile derle
        run: mvn package

      - name: Jar dosyasını yükle
        uses: actions/upload-artifact@v4
        with:
          name: LeasWallet
          path: target/*.jar
